<!DOCTYPE html>
<html lang="km" dir="ltr">
<head>
  <meta charset="UTF-8" />

  <!-- ═══════════════════════════════════════════════════════════
       FIX 4 — Viewport: prevent double-tap zoom, respect safe areas
  ════════════════════════════════════════════════════════════════ -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
             user-scalable=no, viewport-fit=cover" />

  <title>Cafe Bloom POS</title>

  <!-- ═══════════════════════════════════════════════════════════
       FIX 6 — PWA Meta Tags
  ════════════════════════════════════════════════════════════════ -->

  <!-- Theme color (address bar / status bar on Android) -->
  <meta name="theme-color" content="#09080A" />

  <!-- Apple — full-screen when added to home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CafeBloom" />

  <!-- Android -->
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Prevent phone number detection -->
  <meta name="format-detection" content="telephone=no" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Apple touch icons (fallback for iOS — no manifest icon support) -->
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />

  <!-- ═══════════════════════════════════════════════════════════
       FIX 2 — Body overscroll (backup in HTML as well as CSS)
  ════════════════════════════════════════════════════════════════ -->
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #09080A;
      /* FIX 4: true full height */
      height: 100dvh;
      /* FIX 2: block pull-to-refresh */
      overscroll-behavior: none;
      overflow: hidden;
      /* safe-area support (iPhone notch / home bar) */
      padding-top:    env(safe-area-inset-top,    0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left:   env(safe-area-inset-left,   0px);
      padding-right:  env(safe-area-inset-right,  0px);
    }
    /* Loading screen — shown before React hydrates */
    #pwa-splash {
      position: fixed; inset: 0;
      background: #09080A;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 9999;
      font-family: 'Hanuman', 'Noto Sans Khmer', sans-serif;
      color: #EDE8E1;
      transition: opacity .3s;
    }
    #pwa-splash.hidden { opacity: 0; pointer-events: none; }
    #pwa-splash-icon { font-size: 56px; }
    #pwa-splash-title { font-size: 22px; font-weight: 700; color: #E8A84B; }
    #pwa-splash-sub   { font-size: 13px; color: #555; }
    #pwa-splash-spin  {
      width: 30px; height: 30px; margin-top: 4px;
      border: 3px solid #2A2730; border-top-color: #E8A84B;
      border-radius: 50%; animation: splash-spin .8s linear infinite;
    }
    @keyframes splash-spin { to { transform: rotate(360deg); } }
  </style>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&family=Noto+Sans+Khmer:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- PWA Splash (hidden once React mounts) -->
  <div id="pwa-splash">
    <div id="pwa-splash-icon">☕</div>
    <div id="pwa-splash-title">Cafe Bloom POS</div>
    <div id="pwa-splash-sub">កំពុងចាប់ផ្ដើម…</div>
    <div id="pwa-splash-spin"></div>
  </div>

  <!-- React root -->
  <div id="root"></div>

  <!-- Your bundled app -->
  <script type="module" src="/assets/index.js"></script>

  <!-- ═══════════════════════════════════════════════════════════
       FIX 6 — Service Worker Registration
  ════════════════════════════════════════════════════════════════ -->
  <script>
    // Hide splash once React finishes mounting
    document.addEventListener("DOMContentLoaded", () => {
      // Give React ~300ms to mount, then fade out splash
      const splash = document.getElementById("pwa-splash");
      const hideSplash = () => {
        if (splash) {
          splash.classList.add("hidden");
          setTimeout(() => splash.remove(), 350);
        }
      };
      // Watch for first React render inside #root
      const observer = new MutationObserver(() => {
        if (document.getElementById("root")?.children.length > 0) {
          observer.disconnect();
          hideSplash();
        }
      });
      observer.observe(document.getElementById("root"), { childList: true });
      // Hard fallback: hide after 4s regardless
      setTimeout(hideSplash, 4000);
    });

    // Register service worker (PWA — FIX 6)
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("/sw.js", { scope: "/" })
          .then(reg => {
            console.log("[PWA] Service Worker registered ✅", reg.scope);
            // Check for updates in background
            reg.addEventListener("updatefound", () => {
              const newWorker = reg.installing;
              newWorker.addEventListener("statechange", () => {
                if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                  // New version available — optionally notify user
                  console.log("[PWA] New version available — reload to update");
                }
              });
            });
          })
          .catch(err => console.warn("[PWA] SW registration failed:", err));
      });
    }

    // Handle ?page= deep link (shortcuts in manifest)
    const urlPage = new URLSearchParams(location.search).get("page");
    if (urlPage) {
      sessionStorage.setItem("cb_start_page", urlPage);
    }
  </script>
</body>
</html>
